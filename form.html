<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <form class="form-container">
        <div class="form-container">
            <div class="tabs">
                <span class="tab">Login</span>
                <span class="tab-separator">|</span>
                <span class="tab active">Register</span>
            </div>
            <p class="subtitle">Enter your email and password to register.</p>
            <input type="text" placeholder="Username" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
            <div class="separator-text">Or register with</div>
            <button class="btn-social">
                <img src="images/google.svg" alt="Google logo" class="social-icon">
                Continue with Google
            </button>
            <button class="btn-social">
                <img src="images/facebook.svg" alt="Facebook logo" class="social-icon">
                Continue with Facebook
            </button>
        </div>
    </form>

</body>

</html>
