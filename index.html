<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <style>
        /* Базовые стили для выравнивания карточки по центру экрана */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Стили для карточки регистрации */
        .form-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
            max-width: 400px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* Стили для заголовка login / registration */
        .tabs {
            font-size: 24px;
            margin-bottom: 5px;
            color: #333;
        }

        .tabs:active {
            color: #007BFF;
            border-bottom: 2px solid #007BFF;
        }

        /* Стили для полей ввода */
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Стили для кнопки регистрации */
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-sizing: border-box;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Кнопки соцсетей */
        .btn-social {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }

        /* Текст-описание */
        .subtitle {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Стили для всех полей ввода */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            /* Чтобы padding не увеличивал ширину */
            font-size: 14px;
            color: #333;
        }
    </style>
</head>

<body>
    <form class="form-container">
        <div class="form-container">
            <div class="tabs">Login / Registration</div>
            <input type="text" placeholder="Username" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
            <button class="btn-social">Continue with Google</button>
            <button class="btn-social">Continue with Facebook</button>
        </div>
    </form>

</body>

</html>
